name: Build and release wheels

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-x86_64-wheelhouse:
    name: Build Linux x86_64 offline wheelhouse
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build project wheel
        run: python -m build --wheel

      - name: Build Linux x86_64 offline wheelhouse
        run: |
          mkdir -p wheelhouse
          cp dist/*.whl wheelhouse/
          python -m pip download \
            --dest wheelhouse \
            --only-binary=:all: \
            --platform manylinux2014_x86_64 \
            --platform manylinux2010_x86_64 \
            --implementation cp \
            --python-version "39" \
            --abi cp39 \
            --abi abi3 \
            --abi none \
            dist/*.whl
          tar -czf metax-mxtop-linux-x86_64-wheelhouse.tar.gz -C wheelhouse .

      - name: Verify offline install
        run: |
          python -m pip install \
            --no-index \
            --find-links wheelhouse \
            --target offline-test \
            metax-mxtop
          PYTHONPATH=offline-test python -m mxtop.cli --version

      - name: Generate checksums
        run: sha256sum dist/*.whl metax-mxtop-linux-x86_64-wheelhouse.tar.gz > SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: metax-mxtop-linux-x86_64-wheels
          path: |
            dist/*.whl
            metax-mxtop-linux-x86_64-wheelhouse.tar.gz
            SHA256SUMS.txt

  github-release:
    name: Publish GitHub Release
    needs: linux-x86_64-wheelhouse
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: metax-mxtop-linux-x86_64-wheels
          path: release-assets

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd release-assets

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            title="${GITHUB_REF_NAME}"
            notes="Automated wheel release for ${GITHUB_REF_NAME}."
            create_args=(--verify-tag)
          else
            short_sha="${GITHUB_SHA::7}"
            tag="build-${short_sha}"
            title="Build ${short_sha}"
            notes="Automated Linux x86_64 wheel build for commit ${GITHUB_SHA}."
            create_args=(--target "${GITHUB_SHA}" --prerelease)
          fi

          mapfile -t assets < <(find . -type f \( -name '*.whl' -o -name '*.tar.gz' -o -name 'SHA256SUMS.txt' \) | sort)

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" \
              "${assets[@]}" \
              --title "${title}" \
              --notes "${notes}" \
              "${create_args[@]}"
          fi

  pypi-release:
    name: Publish PyPI package
    needs: linux-x86_64-wheelhouse
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/metax-mxtop
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build PyPI distributions
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
